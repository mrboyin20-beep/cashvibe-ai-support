<!DOCTYPE html>
<html>
<head>
<title>CashVibe AI Call</title>

<style>
body{
margin:0;
background:#0f172a;
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
width:320px;
background:#111827;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 0 40px rgba(0,0,0,0.7);
}

button{
margin-top:15px;
padding:12px 20px;
border:none;
border-radius:12px;
background:#22c55e;
color:white;
cursor:pointer;
}

.end{background:red;}
</style>

</head>

<body>

<div class="box">

<h2>📞 CashVibe AI Call</h2>
<p id="status">Ready</p>

<button onclick="startCall()">Start Call</button>
<button class="end" onclick="endCall()">End</button>

</div>

<script>

let recognition;
let calling=false;
let step=0;

const questions=[
"Kya aap CashVibe ke baare me jaana chahte hain?",
"Kya aap earning process samajhna chahte hain?",
"Kya aap withdrawal ke baare me jaana chahte hain?",
"Kya aap owner se baat karna chahte hain?"
];

// 🔥 START CALL WITH MIC FIX
async function startCall(){

calling=true;
step=0;

updateStatus("Requesting mic...");

// FORCE mic permission
try{
await navigator.mediaDevices.getUserMedia({ audio:true });
}catch(e){
alert("Mic allow karo warna call nahi chalega");
return;
}

speak("Hello! CashVibe support me aapka swagat hai.");

setTimeout(askQuestion,2000);

}

// ASK QUESTIONS
function askQuestion(){

if(!calling) return;

let q=questions[step];

speak(q);

setTimeout(startListening,2500);

}

// LISTEN USER
function startListening(){

if(!calling) return;

try{

recognition=new(window.SpeechRecognition || window.webkitSpeechRecognition)();

recognition.lang="hi-IN";
recognition.start();

updateStatus("Listening...");

recognition.onresult=(e)=>{

let text=e.results[0][0].transcript.toLowerCase();

updateStatus("You: "+text);

handleAnswer(text);

};

recognition.onerror=()=>{
updateStatus("Mic error... retry");
setTimeout(startListening,1500);
};

}catch(e){
alert("Chrome browser use karo");
}

}

// HANDLE ANSWER
function handleAnswer(text){

if(text.includes("haan") || text.includes("yes")){
handleYes();
}
else if(text.includes("na") || text.includes("no")){
handleNo();
}
else{
speak("Sirf haan ya na bole");
setTimeout(startListening,1500);
}

}

// YES FLOW
function handleYes(){

if(step===0){
speak("CashVibe ek earning platform hai jahan aap tasks aur referral se paisa kama sakte hain.");
}

if(step===1){
speak("Aap daily tasks aur ads dekh kar earning kar sakte hain.");
}

if(step===2){
speak("Minimum coins hone par aap withdrawal kar sakte hain.");
}

if(step===3){
connectOwner();
return;
}

step++;

setTimeout(askQuestion,3000);

}

// NO FLOW
function handleNo(){

step++;

if(step<questions.length){
askQuestion();
}else{
speak("Dhanyavaad, aapka din shubh ho");
endCall();
}

}

// SPEAK FUNCTION
function speak(text){

let msg=new SpeechSynthesisUtterance(text);

msg.lang="hi-IN";

speechSynthesis.speak(msg);

updateStatus("AI: "+text);

}

// CALL OWNER
function connectOwner(){

speak("Main aapko owner se connect kar raha hoon");

setTimeout(()=>{
window.location.href="tel:+919288678795";
},2500);

}

// END CALL
function endCall(){

calling=false;

if(recognition) recognition.stop();

updateStatus("Call Ended");

}

// STATUS
function updateStatus(t){
document.getElementById("status").innerText=t;
}

</script>

</body>
</html>
