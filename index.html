<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shout to Fly - Voice Game</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: linear-gradient(to top, #fbc2eb, #a6c1ee);
    font-family: 'Comic Sans MS', cursive, sans-serif;
    overflow: hidden;
    margin: 0;
  }

  #gameArea {
    width: 300px;
    height: 500px;
    background: #ffffffcc;
    border: 3px solid #333;
    border-radius: 20px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 20px #ff69b4;
  }

  #ropeLeft, #ropeRight {
    width: 15px;
    height: 100%;
    background: #8b4513;
    position: absolute;
    top: 0;
    border-radius: 10px;
    box-shadow: inset 0 0 5px #00000050;
  }

  #ropeLeft { left: 50px; }
  #ropeRight { right: 50px; }

  #ball {
    width: 35px;
    height: 35px;
    background: #ff4500;
    border-radius: 50%;
    position: absolute;
    left: 132px;
    bottom: 50px;
    box-shadow: 0 0 15px #ff6347;
    transition: transform 0.1s;
  }

  #score {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 22px;
    font-weight: bold;
    color: #333;
    text-shadow: 1px 1px 2px #fff;
  }

  #gameOver {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 32px;
    color: #ff0000;
    display: none;
    text-shadow: 2px 2px 5px #000;
    animation: blink 1s infinite;
  }

  @keyframes blink {
    0%, 50%, 100% { opacity: 1; }
    25%, 75% { opacity: 0; }
  }
</style>
</head>
<body>
<div id="gameArea">
  <div id="ropeLeft"></div>
  <div id="ropeRight"></div>
  <div id="ball"></div>
  <div id="score">Score: 0</div>
  <div id="gameOver">Game Over!</div>
</div>

<script>
const ball = document.getElementById('ball');
const scoreEl = document.getElementById('score');
const gameOverEl = document.getElementById('gameOver');

let ballBottom = 50;
let velocity = 0;
let gravity = -0.5;
let score = 0;
let gameRunning = true;

// Game over sound
let gameOverSound = new Audio('gameover.mp3'); // <-- Place gameover.mp3 in same folder

// Voice recognition setup
if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert("Browser does not support voice recognition. Use Chrome or Edge.");
} else {
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.continuous = true;
    recognition.lang = 'en-US';

    recognition.onstart = () => {
        console.log("🎤 Mic activated! Shout to fly!");
    };

    recognition.onerror = (event) => {
        console.log("Error: ", event.error);
        if(event.error === 'not-allowed') alert("Please allow microphone access!");
    };

    recognition.onresult = (event) => {
        const transcript = event.results[event.results.length-1][0].transcript.trim();
        if(transcript.length > 0 && gameRunning){
            velocity = 8; // loud voice moves ball up
            ball.style.transform = 'scale(1.2)'; // fun animation
            setTimeout(()=>{ ball.style.transform = 'scale(1)'; }, 100);
        }
    };

    // Start recognition on first user click (required by some browsers)
    document.body.addEventListener('click', () => {
        recognition.start();
        alert("Mic is now active! Shout to move the ball!");
    }, { once: true });
}

function gameLoop(){
    if(!gameRunning) return;

    // Gravity & movement
    velocity += gravity;
    ballBottom += velocity;

    // Ball touches ground → Game Over
    if(ballBottom <= 0){
        ballBottom = 0;
        gameOver();
    }

    // Max height
    if(ballBottom >= 465){
        ballBottom = 465;
        velocity = 0;
    }

    ball.style.bottom = ballBottom + 'px';

    // Score: ball passes between ropes
    if(ballBottom > 50 && ballBottom < 465){
        if(!ball.passed){
            score++;
            scoreEl.innerText = "Score: " + score;
            ball.passed = true;
            setTimeout(()=>{ ball.passed = false; }, 500);
        }
    }

    requestAnimationFrame(gameLoop);
}

function gameOver(){
    gameRunning = false;
    gameOverEl.style.display = 'block';
    gameOverSound.play();
}

gameLoop();
</script>
</body>
</html>
