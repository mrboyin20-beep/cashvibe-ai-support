<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CashVibe User Form</title>
<style>
  body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(120deg, #f6d365, #fda085);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .form-container {
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    width: 350px;
    animation: slideIn 1s ease forwards;
  }

  @keyframes slideIn {
    0% { opacity: 0; transform: translateY(-50px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  h2 {
    text-align: center;
    margin-bottom: 30px;
    color: #ff6f61;
  }

  input {
    width: 100%;
    padding: 12px 15px;
    margin: 10px 0;
    border: 2px solid #f0f0f0;
    border-radius: 10px;
    transition: all 0.3s ease;
    outline: none;
  }

  input:focus {
    border-color: #ff6f61;
    box-shadow: 0 0 10px rgba(255,111,97,0.5);
  }

  button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(45deg, #ff6f61, #ffb347);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  button:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 20px rgba(255,111,97,0.5);
  }

  .id-box {
    margin-top: 20px;
    text-align: center;
    font-weight: bold;
    color: #ff6f61;
    display: none;
  }
</style>
</head>
<body>

<div class="form-container">
  <h2>CashVibe SignUp</h2>
  <input type="text" id="name" placeholder="Your Name">
  <input type="text" id="whatsapp" placeholder="WhatsApp Number">
  <input type="text" id="details" placeholder="Basic Details">
  <button onclick="generateID()">Submit</button>
  <div class="id-box" id="idBox"></div>
</div>

<script>
  function generateID() {
    const name = document.getElementById('name').value.trim();
    const whatsapp = document.getElementById('whatsapp').value.trim();
    const details = document.getElementById('details').value.trim();

    if(!name || !whatsapp || !details) {
      alert('Please fill all fields!');
      return;
    }

    // Unique ID generation
    const uniqueID = 'CV' + Math.floor(Math.random() * 1000000);
    const idBox = document.getElementById('idBox');
    idBox.style.display = 'block';
    idBox.textContent = `Your ID: ${uniqueID}`;

    // Optional: Clear fields after submit
    document.getElementById('name').value = '';
    document.getElementById('whatsapp').value = '';
    document.getElementById('details').value = '';

    // Aap WhatsApp ya backend me bhejne ka code yahan add karenge
  }
</script>

</body>
</html>
