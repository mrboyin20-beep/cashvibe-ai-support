<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CashVibe AI Chat Support</title>

<style>
/* FLOATING BUTTON HATA DIYA, PURE PAGE CHAT */
body {
    font-family: sans-serif;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.chat-container {
    width: 400px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

#chatHeader {
    background: #0084ff;
    color: white;
    padding: 15px;
    text-align: center;
    font-weight: bold;
}

#chatbox {
    height: 400px;
    overflow-y: auto;
    padding: 10px;
    background: #f5f5f5;
    flex: 1;
}

.user, .bot {
    padding: 8px;
    margin: 5px;
    border-radius: 8px;
}

.user {
    background: #0084ff;
    color: white;
    text-align: right;
}

.bot {
    background: #e0e0e0;
    text-align: left;
}

.input-area {
    display: flex;
    border-top: 1px solid #ccc;
}

input {
    flex: 1;
    border: none;
    padding: 10px;
    font-size: 16px;
}

button {
    border: none;
    background: #0084ff;
    color: white;
    padding: 10px;
    cursor: pointer;
    font-size: 16px;
}
</style>
</head>

<body>

<div class="chat-container">
    <div id="chatHeader">CashVibe Support 🤖</div>
    <div id="chatbox"></div>

    <div class="input-area">
        <input id="userInput" placeholder="Type your message..." />
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
const API_TOKEN = "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"; // <-- Replace with your Hugging Face token

// Add message to chat
function addMessage(text, sender) {
    let chatbox = document.getElementById("chatbox");
    let msg = document.createElement("div");
    msg.className = sender;
    msg.innerText = text;
    chatbox.appendChild(msg);
    chatbox.scrollTop = chatbox.scrollHeight;
}

// Quick FAQ replies
function getLocalReply(msg) {
    msg = msg.toLowerCase();
    if (msg.includes("withdraw")) return "Withdraw 24 hour me process hota hai 💸";
    if (msg.includes("recharge")) return "Recharge ke liye coins hone chahiye 👍";
    if (msg.includes("account")) return "Account problem ho to logout karke login karo 🔐";
    return null;
}

// Send message
async function sendMessage() {
    let input = document.getElementById("userInput").value;
    if (!input) return;

    addMessage(input, "user");
    document.getElementById("userInput").value = "";

    // Check local FAQ first
    let localReply = getLocalReply(input);
    if (localReply) {
        addMessage(localReply, "bot");
        return;
    }

    // AI reply
    let response = await fetch(
        "https://api-inference.huggingface.co/models/microsoft/DialoGPT-medium",
        {
            method: "POST",
            headers: {
                "Authorization": "Bearer " + API_TOKEN,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                inputs: "You are a smart customer support AI for CashVibe app. Answer shortly: " + input
            })
        }
    );

    let data = await response.json();
    let reply = data.generated_text || "Network slow hai 😅, try karo phir";
    addMessage(reply, "bot");
}
</script>

</body>
</html>
